name: CI + Pages

on:
  push:
    branches: [main]
    tags: [v*]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@v6
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: uv sync --group dev

      - name: Lint
        run: make lint

      - name: Format check
        run: uv run ruff format src tests scripts --check

      - name: Tests
        run: make test

      - name: Coverage
        run: make coverage

  build-pages:
    if: github.event_name != 'pull_request'
    needs: quality
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@v6
        with:
          python-version: '3.13'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Python dependencies
        run: uv sync --group dev

      - name: Install web dependencies
        working-directory: frontend
        run: pnpm install --no-frozen-lockfile

      - name: Verify committed DB exists
        run: test -f active.db

      - name: Build static dataset + webapp
        env:
          VITE_BASE_PATH: /${{ github.event.repository.name }}/app/
        run: uv run podcast-atlas build-static --db active.db --dataset-out static_site/dataset.json --web-dir frontend

      - name: Build GitHub Pages bundle
        run: |
          uv run python scripts/build_pages_bundle.py \
            --db active.db \
            --dataset static_site/dataset.json \
            --web-dist frontend/dist \
            --static-site static_site \
            --out pages \
            --repo "${{ github.repository }}" \
            --sha "${{ github.sha }}"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: pages

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  create-release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: quality
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@v6
        with:
          python-version: '3.13'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Python dependencies
        run: uv sync --group dev

      - name: Install web dependencies
        working-directory: frontend
        run: pnpm install --no-frozen-lockfile

      - name: Verify committed DB exists
        run: test -f active.db

      - name: Build release artifacts
        env:
          VITE_BASE_PATH: /${{ github.event.repository.name }}/app/
        run: |
          uv run podcast-atlas build-static \
            --db active.db \
            --dataset-out static_site/dataset.json \
            --web-dir frontend
          uv run python scripts/build_pages_bundle.py \
            --db active.db \
            --dataset static_site/dataset.json \
            --web-dist frontend/dist \
            --static-site static_site \
            --out pages \
            --repo "${{ github.repository }}" \
            --sha "${{ github.sha }}"

      - name: Package release archive
        run: |
          mkdir -p release_bundle
          cp active.db release_bundle/
          cp static_site/dataset.json release_bundle/
          cp -r static_site release_bundle/static_site
          cp -r pages release_bundle/pages
          tar -czf "historycasts-${{ github.ref_name }}-artifacts.tar.gz" release_bundle

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: historycasts-${{ github.ref_name }}-artifacts.tar.gz
          generate_release_notes: true
